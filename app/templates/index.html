{% extends "base.html" %}

{% block head %}
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/basic.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.1.1/dist/chartjs-plugin-annotation.min.js"></script>
    <script defer src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</head>
{% endblock %}

{% block content %}
<main>
    <h1>Game Statistics Dashboard</h1>
    
    <!-- Game Duration and First KO Section - Side by Side -->
    <div class="dashboard-row">
        <!-- Game Duration Section -->
        <section class="dashboard-section dashboard-section-half">
            <h2 class="section-title">Game Duration</h2>
            <div class="chart-row">
                <div class="chart-container-compact">
                    <canvas id="turnsChart"></canvas>
                </div>
                <div class="stats-cards-compact">
                    <div class="stat-card">
                        <div class="stat-label">Avg Turns</div>
                        <div class="stat-value">{{ avg_turns }}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Median</div>
                        <div class="stat-value">{{ median_turns }}</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- First KO Section -->
        <section class="dashboard-section dashboard-section-half">
            <h2 class="section-title">First Knockout</h2>
            <div class="chart-row">
                <div class="chart-container-compact">
                    <canvas id="koturnsChart"></canvas>
                </div>
                <div class="stats-cards-compact">
                    <div class="stat-card">
                        <div class="stat-label">Avg KO</div>
                        <div class="stat-value">{{ avg_ko_turns }}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Median</div>
                        <div class="stat-value">{{ median_ko_turns }}</div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Wincons Section -->
    <section class="dashboard-section">
        <h2 class="section-title">Wincons</h2>
        <div class="chart-row chart-row-center">
            <div class="chart-container-pie">
                <canvas id="finalBlowChart"></canvas>
            </div>
            <div class="chart-container-pie">
                <canvas id="firstKoChart"></canvas>
            </div>
        </div>
    </section>

    <!-- Color Statistics Section -->
    <section class="dashboard-section">
        <h2 class="section-title">Color Statistics</h2>
        <div class="chart-row">
            <div class="chart-container-medium">
                <canvas id="likelihoodChart"></canvas>
            </div>
            <div class="chart-container-medium">
                <canvas id="averageChart"></canvas>
            </div>
            <div class="chart-container-medium">
                <canvas id="deckPercentageChart"></canvas>
            </div>
        </div>
    </section>

    <!-- Hidden data elements -->
    <script type="application/json" id="color-usage-data">
        {{ color_usage | tojson }}
    </script>
    <script type="application/json" id="turn-data">
        {{ turn_data | tojson }}
    </script>
    <script type="application/json" id="ko-turn-data">
        {{ ko_turn_data | tojson }}
    </script>
    <script type="application/json" id="final-blow-data">
        {{ final_blow_data | tojson }}
    </script>
    <script type="application/json" id="first-ko-data">
        {{ first_ko_data | tojson }}
    </script>
</main>
{% endblock %}
